<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8-Ball Pool — Midnight Billiards</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts: Display + Body pair -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════
       START SCREEN
  ═══════════════════════════════════════════════════════════════ -->
  <div id="startScreen" class="screen active">
    <div class="start-bg"></div>
    <div class="start-content">
      <div class="logo-wrap">
        <div class="ball-8-logo">8</div>
        <h1 class="game-title">Midnight Billiards</h1>
        <p class="game-subtitle">Premium 8-Ball Pool</p>
      </div>
      <div class="menu-buttons">
        <button class="btn-primary" id="btn2Player">⚔ Two Players</button>
        <button class="btn-primary" id="btnVsAI">🤖 vs AI</button>
      </div>
      <div class="sound-toggle-wrap">
        <button class="btn-sound" id="soundToggle">🔊 Sound ON</button>
      </div>
      <div class="start-footer">Click &amp; drag to aim • Hold for power • Release to shoot</div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       GAME SCREEN
  ═══════════════════════════════════════════════════════════════ -->
  <div id="gameScreen" class="screen">

    <!-- HUD Top Bar -->
    <div id="hud">
      <div class="player-panel" id="p1Panel">
        <div class="player-name">Player 1</div>
        <div class="ball-type-label" id="p1Type">—</div>
        <div class="ball-rack" id="p1Balls"></div>
      </div>

      <div class="center-hud">
        <div class="turn-indicator" id="turnIndicator">Player 1's Turn</div>
        <div class="foul-msg" id="foulMsg"></div>
      </div>

      <div class="player-panel right" id="p2Panel">
        <div class="player-name" id="p2Name">Player 2</div>
        <div class="ball-type-label" id="p2Type">—</div>
        <div class="ball-rack" id="p2BallsRight"></div>
      </div>
    </div>

    <!-- Canvas Container (perspective tilt effect) -->
    <div id="tableWrap">
      <canvas id="poolCanvas"></canvas>
      <!-- Cue Stick SVG overlay (positioned absolutely) -->
      <div id="cueOverlay"></div>
    </div>

    <!-- Power Meter -->
    <div id="powerMeterWrap">
      <div class="power-label">POWER</div>
      <div id="powerBar">
        <div id="powerFill"></div>
      </div>
    </div>

    <!-- Bottom Controls -->
    <div id="bottomBar">
      <button class="btn-sm" id="btnMenu">Menu</button>
      <div class="status-msg" id="statusMsg">Aim and shoot!</div>
      <button class="btn-sm" id="btnSoundGame">🔊</button>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════════════════════
       GAME OVER SCREEN
  ═══════════════════════════════════════════════════════════════ -->
  <div id="gameOverScreen" class="screen">
    <div class="gameover-card">
      <div class="trophy">🏆</div>
      <h2 class="winner-text" id="winnerText">Player 1 Wins!</h2>
      <p class="gameover-sub" id="gameOverSub">Pocketed the 8-ball correctly.</p>
      <div class="gameover-buttons">
        <button class="btn-primary" id="btnPlayAgain">Play Again</button>
        <button class="btn-primary ghost" id="btnMainMenu">Main Menu</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
